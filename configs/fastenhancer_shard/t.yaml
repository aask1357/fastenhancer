model: "fastenhancer.default"
model_kwargs:
    channels: 24
    kernel_size: [8, 3, 3]
    stride: 4
    rnnformer_kwargs:
        num_blocks: 2
        channels: 20
        freq: 16
        num_heads: 4
        eps: 1.0e-5
        positional_embedding: train # null | "fixed" | "train"
        attn_bias: False
        post_act: False
        pre_norm: False
    pre_post_init: "linear_fixed"
    n_fft: 512
    hop_size: 256
    win_size: 512
    window: hann
    stft_normalized: False
    mask: null
    activation: SiLU
    activation_kwargs:
        inplace: True
    input_compression: 0.3
    normalize_final_conv: True
    weight_norm: True
    resnet: False
wrapper: ns_shard
data: 
    dataset:
        train: ShardOnTheFly
        valid: NoiseSuppression
        infer: NoiseSuppression
        pesq: NoiseSuppression
    train:
        inputs:
            speech:
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/dns-wo-german-w-singing
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/vctk-train
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/aishell3
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/ears
                    weight: 1.0
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/hifitts1-clean
                    weight: 1.0
                -
                    shard_dir: /home/shahn/Datasets/asr/speech/shard/expresso
                    weight: 1.0
            noise:
                -
                    shard_dir: /home/shahn/Datasets/asr/noise/shard/dns
                    weight: 4.0
                -
                    shard_dir: /home/shahn/Datasets/asr/noise/shard/demand-train
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/noise/shard/wham
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/noise/shard/tut-urban-2018-dev
                    weight: 2.0
                -
                    shard_dir: /home/shahn/Datasets/asr/noise/shard/fma
                    weight: 2.0
            rir:
                -
                    shard_dir: /home/shahn/Datasets/asr/rir/shard/dns-rir
                    weight: 1.0
        mixer:
            speech_dbFS: [-35.0, -15.0]
            snr        : [0.0, 20.0]
            seg_rel_threshold: -25.0
            seg_abs_threshold: null     # This must be set null or very low value.
        num_buckets: 30
        max_utt_duration: 20.0
        min_utt_duration: 0.5

        prob_speech_codec: 0.0
        prob_speech_reverb: 0.5
        prob_farend_echo: 0.0
        prob_farend_only: 0.0
        prob_noise: 1.0

        aux_buffer_size: 5000       # pre-fetch pool for noise/fe/rir; hides shard TAR open bursts
        sampler_buffer_size: 10000  # DynamicBucketingSampler pool; needs >= max_duration/avg_dur * num_buckets
        shuffle: True
        num_workers: 2
        pin_memory: False
        persistent_workers: True
        prefetch_factor: 1
    valid:
        clean_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/clean"
        noisy_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/noisy"
        segment_size: 32000
    infer:
        clean_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/clean"
        noisy_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/noisy"
        files:
            - "002"     # SNR 17, washer noise
            - "066"     # SNR 11, air conditioner noise
            - "063"     # SNR 6, bird noise
            - "053"     # SNR 1, water noise
    pesq:
        clean_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/clean"
        noisy_dir: "/home/shahn/Datasets/DNS-Challenge/16khz/testset_synthetic_interspeech2020/no_reverb/noisy"
        segment_size: null

    max_duration: 128   # Maximum duration of audios in a batch in seconds.
    dereverberation:
        rir_target_type: rts    # null | anechoic | early_rir | weighted_rir | rts
        early_rir_sec: 0.05     # Used when rir_target_type==early_rir.
        t60_max: 0.15           # Used when rir_target_type==weighted_rir.

    sampling_rate: 16000
train:
    test: False
    save_interval: 10
    max_epochs: 200
    steps_per_epoch: 1000
    fp16: True
    clip_grad: null
    seed: 1
    plot_param_and_grad: False

    losses:
        mag_mse:
            weight: 0.3
        complex_mse:
            weight: 0.2
        consistency:
            weight: 0.3
            compression: 0.3
        wav_l1:
            weight: 0.2
    optimizer: "AdamP"
    optimizer_kwargs:
        lr: 0.002
        weight_decay: 0.01
        wd_ratio: 1.0
        betas: [0.95, 0.999]
    optimizer_groups:
        -
            regex_list:
                - "rnn\\.\\d\\.rnn.+parametrizations.+original0$"   # GRU weight_g
                - "enc_pre\\.2\\.weight"            # prelu
                - "(en|de)coder\\.\\d\\.2\\.weight" # prelu
                - "rnn_(pre|post)\\.1\\.weight"     # prelu
                - "dec_post\\.scale"                # scale
            weight_decay: 0
            projection: disabled
        -
            regex_list:
                - "rnn_pre\\.0.+parametrizations.+original1$"   # weight_v
                - "rnn\\.\\d\\..+parametrizations.+original1$"  # weight_v
                - "enc_pre\\.0\\.weight"                # conv1d before BN
                - "(en|de)coder\\.\\d\\.0\\.weight"     # conv1d before BN
                - "rnn_(pre|post)\\.2\\.weight"         # conv1d before BN
            projection: channelwise
        -
            regex_list:
                - "dec_post\\.weight"                   # final conv
            projection: layerwise
        -
            regex_list:
                - "rnn_post\\.0.+parametrizations.+original1$"  # weight_v
            projection: 1
    scheduler: CosineAnnealingWarmup
    scheduler_kwargs:
        warmup_iterations: 500
        eta_min: 1.0e-6
        warn: False
valid:
    batch_size: 64
    num_workers: 2
infer:
    batch_size: 1
    interval: 10
    num_workers: 0
pesq:
    batch_size: 4
    num_workers: 0              # num_workers for a dataloader
    num_workers_executor: 8     # num_workers for a multiprocess executor
    interval: 10
    metrics_to_calculate:
        pesq: True
        stoi: True